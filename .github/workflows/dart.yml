name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Install Flutter dependencies
        run: flutter pub get


      # - name: Inject GoogleService-Info.plist
      #   run: |
      #     echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist
      #     ls -la ios/Runner/GoogleService-Info.plist
      - name: Inject GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist
          cp ios/Runner/GoogleService-Info.plist ios/GoogleService-Info.plist
          ls -la ios/Runner/GoogleService-Info.plist
          ls -la ios/GoogleService-Info.plist

      - name: Register GoogleService-Info.plist in Xcode project
        run: |
          pip3 install pbxproj --quiet --break-system-packages
          python3 - << 'EOF'
          from pbxproj import XcodeProject

          project = XcodeProject.load('ios/Runner.xcodeproj/project.pbxproj')

          # Check if already registered to avoid duplicates
          files = [f.get_name() for f in project.get_files_by_name('GoogleService-Info.plist')]
          if files:
              print("GoogleService-Info.plist already registered, skipping.")
          else:
              project.add_file(
                  'GoogleService-Info.plist',
                  parent=project.get_or_create_group('Runner'),
                  target_name='Runner',
                  force=False
              )
              project.save()
              print("Successfully registered GoogleService-Info.plist")
          EOF

      - name: Verify registration
        run: |
          grep -c "GoogleService-Info.plist" ios/Runner.xcodeproj/project.pbxproj


      - name: Create Podfile
        working-directory: ios
        run: |
          cat > Podfile << 'EOF'
          platform :ios, '15.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end

            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig and running flutter pub get again"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            target 'RunnerTests' do
              inherit! :search_paths
            end
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF

      - name: Set iOS deployment target in project.pbxproj
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          mv Runner.app/ Payload
          zip -qq -r -9 FlutterIpaExport.ipa Payload

      - name: Upload IPA to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"
